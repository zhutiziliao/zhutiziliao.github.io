<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>联系我</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e4ebf5);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #333;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    .contact {
      margin-top: 20px;
      font-size: 16px;
    }

    .contact div {
      margin: 10px 0;
      padding: 10px;
      background: #f2f4f8;
      border-radius: 8px;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>联系方式</h1>
    <p>如果 Telegram 联系不上我，请使用以下方式联系：</p>

    <div class="contact">
      <div>📱 Telegram：@chachacathy</div>
      <div>📧 Email：fen82165@gmail.com</div>
    </div>

    <footer>
      本页面为备用联系页
    </footer>
  </div>
</body>
</html>
